<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>World Events | Barford Golf Society</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

:root{
--green:#005a2b;
--gold:#d4af37;
--light-bg:#f7f7f5;
--shadow:rgba(0,0,0,0.1);
}

body{
font-family:Inter;
margin:0;
background:var(--light-bg);
}

.container{
max-width:900px;
margin:auto;
padding:30px;
}

.event-card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 8px var(--shadow);
margin-bottom:25px;
}

.vote-count{
display:flex;
gap:20px;
font-weight:700;
margin-top:10px;
}

.yes{color:#006d2c;}
.no{color:#b30000;}

input,select{
width:100%;
padding:10px;
margin-top:6px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:var(--green);
color:white;
border:none;
padding:10px 16px;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

.admin-btn{
background:var(--gold);
color:black;
}

.admin-panel{
border:2px solid var(--gold);
padding:20px;
border-radius:10px;
background:white;
display:none;
margin-bottom:25px;
}

video{
width:100%;
border-radius:6px;
margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<h2>🌍 World Golf Events</h2>

<button class="admin-btn" onclick="toggleAdmin()">🔐 Admin Access</button>

<div id="adminPanel" class="admin-panel">

<h3>Create Event</h3>

<label>Event Name</label>
<input id="eventName">

<label>Upload Video</label>
<input type="file" id="videoFile" accept="video/*">

<button onclick="createEvent()">Create Event</button>

</div>

<div id="eventList"></div>

</div>

<script>

const ADMIN_PASSWORD="westbrom1997"

const supa_URL="https://tzzkgfehtnuizamzlbgr.supabase.co"
const supa_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR6emtnZmVodG51aXphbXpsYmdyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjI0MzY5ODAsImV4cCI6MjA3ODAxMjk4MH0.2mf4RMbJJvPo0NApywlrDyHuqAMfMyEWxgOS2ZSP4KQ"

const {createClient}=supabase
const supa=createClient(supa_URL,supa_KEY)

window.onload=loadEvents

async function loadEvents(){

const {data:events}=await supa
.from("trip_events")
.select("*")
.order("created_at",{ascending:false})

const container=document.getElementById("eventList")
container.innerHTML=""

for(const ev of events){

const {data:votes}=await supa
.from("trip_votes")
.select("*")
.eq("event_id",ev.id)

let yes=0
let no=0

votes?.forEach(v=>{
if(v.vote==="yes") yes++
if(v.vote==="no") no++
})

container.innerHTML+=`

<div class="event-card">

<h3>${ev.name}</h3>

${ev.video ? `
<video controls>
<source src="${ev.video}">
</video>` : ""}

<div class="vote-count">
<span class="yes">👍 Interested: ${yes}</span>
<span class="no">👎 Not Interested: ${no}</span>
</div>

<form onsubmit="submitVote(event,${ev.id})">

<label>Your Name</label>
<input id="name_${ev.id}" required>

<label>Interested?</label>
<select id="vote_${ev.id}" required>
<option value="">Select</option>
<option value="yes">Yes</option>
<option value="no">No</option>
</select>

<button type="submit">Submit Vote</button>

</form>

</div>
`

}

}

async function submitVote(e,eventId){

e.preventDefault()

const name=document.getElementById("name_"+eventId).value
const vote=document.getElementById("vote_"+eventId).value

await supa.from("trip_votes").insert([{
event_id:eventId,
name,
vote
}])

loadEvents()

}

function toggleAdmin(){

const isAdmin=localStorage.getItem("isAdmin")

if(!isAdmin){

const pass=prompt("Enter admin password")

if(pass!==ADMIN_PASSWORD){
alert("Wrong password")
return
}

localStorage.setItem("isAdmin",true)
document.getElementById("adminPanel").style.display="block"

}else{

localStorage.removeItem("isAdmin")
document.getElementById("adminPanel").style.display="none"

}

}

async function createEvent(){

const name=document.getElementById("eventName").value
const file=document.getElementById("videoFile").files[0]

if(!name || !file){
alert("Enter name and choose video")
return
}

const fileName=Date.now()+"_"+file.name

await supa.storage
.from("trip-videos")
.upload(fileName,file)

const {data}=supa.storage
.from("trip-videos")
.getPublicUrl(fileName)

await supa.from("trip_events").insert([{
name:name,
video:data.publicUrl
}])

document.getElementById("eventName").value=""
document.getElementById("videoFile").value=""

loadEvents()

}

</script>

</body>
</html>
