<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>World Events | Barford Golf Society</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

:root{
--green:#005a2b;
--gold:#d4af37;
--light-bg:#f7f7f5;
--card-bg:#fff;
--text-dark:#1b1b1b;
--shadow:rgba(0,0,0,0.1);
}

body{
font-family:Inter;
margin:0;
background:var(--light-bg);
color:var(--text-dark);
}

.container{
max-width:900px;
margin:auto;
padding:30px;
}

h2{
color:var(--green);
}

.vote-box{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 8px var(--shadow);
margin-bottom:20px;
}

.vote-count{
display:flex;
gap:20px;
margin-top:10px;
font-weight:700;
font-size:1.2rem;
}

.vote-count span{
padding:10px 16px;
border-radius:6px;
}

.yes{
background:#e6f6ec;
color:#006d2c;
}

.no{
background:#fdeaea;
color:#b30000;
}

input,select{
width:100%;
padding:10px;
margin-top:6px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:var(--green);
color:white;
border:none;
padding:12px 16px;
border-radius:8px;
cursor:pointer;
font-weight:600;
margin-top:12px;
}

button:hover{
background:#00753f;
}

.admin-btn{
background:var(--gold);
color:black;
margin-bottom:15px;
}

.admin-panel{
border:2px solid var(--gold);
padding:20px;
border-radius:10px;
background:white;
display:none;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

td{
padding:8px;
border-bottom:1px solid #ddd;
}

.video{
margin-bottom:20px;
}

</style>
</head>

<body>

<div class="container">

<h2>🌍 World Golf Events</h2>

<div class="video">

<!-- Replace this with your trip video -->
<iframe width="100%" height="350"
src="https://www.youtube.com/embed/YOUR_VIDEO_ID"
frameborder="0"
allowfullscreen>
</iframe>

</div>

<div class="vote-box">

<h3>Would you be interested in this golf trip?</h3>

<form onsubmit="submitVote(event)">

<label>Your Name</label>
<input id="name" required>

<label>Interested?</label>
<select id="vote" required>
<option value="">Select</option>
<option value="yes">Yes</option>
<option value="no">No</option>
</select>

<button type="submit">Submit Vote</button>

<div id="msg"></div>

</form>

<div class="vote-count">

<span class="yes">👍 Interested: <span id="yesCount">0</span></span>
<span class="no">👎 Not Interested: <span id="noCount">0</span></span>

</div>

</div>

<button class="admin-btn" onclick="toggleAdmin()">🔐 Admin Access</button>

<div id="adminPanel" class="admin-panel">

<h3>Admin Votes</h3>

<table id="adminTable">
<tr>
<td><strong>Name</strong></td>
<td><strong>Vote</strong></td>
<td></td>
</tr>
</table>

</div>

</div>

<script>

const ADMIN_PASSWORD = "westbrom1997";

const supa_URL = "https://tzzkgfehtnuizamzlbgr.supabase.co";

const supa_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR6emtnZmVodG51aXphbXpsYmdyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjI0MzY5ODAsImV4cCI6MjA3ODAxMjk4MH0.2mf4RMbJJvPo0NApywlrDyHuqAMfMyEWxgOS2ZSP4KQ";

const { createClient } = supabase;

const supa = createClient(supa_URL,supa_KEY);


window.onload = () => {

loadVotes()

}


async function submitVote(e){

e.preventDefault()

const name=document.getElementById("name").value.trim()
const vote=document.getElementById("vote").value

if(!name||!vote)return

await supa.from("trip_votes").insert([{

name:name,
vote:vote

}])

document.getElementById("msg").innerText="✅ Vote submitted"

loadVotes()

}


async function loadVotes(){

const {data}=await supa
.from("trip_votes")
.select("*")

let yes=0
let no=0

data.forEach(v=>{

if(v.vote==="yes")yes++
if(v.vote==="no")no++

})

document.getElementById("yesCount").innerText=yes
document.getElementById("noCount").innerText=no

}


function toggleAdmin(){

const isAdmin=localStorage.getItem("isAdmin")

if(!isAdmin){

const pass=prompt("Enter admin password")

if(pass!==ADMIN_PASSWORD){

alert("Wrong password")

return

}

localStorage.setItem("isAdmin",true)

document.getElementById("adminPanel").style.display="block"

loadAdminVotes()

}

else{

localStorage.removeItem("isAdmin")

document.getElementById("adminPanel").style.display="none"

}

}


async function loadAdminVotes(){

const {data}=await supa
.from("trip_votes")
.select("*")
.order("created_at",{ascending:true})

const table=document.getElementById("adminTable")

table.innerHTML=`
<tr>
<td><strong>Name</strong></td>
<td><strong>Vote</strong></td>
<td></td>
</tr>
`

data.forEach(v=>{

table.innerHTML+=`
<tr>
<td>${v.name}</td>
<td>${v.vote}</td>
<td>
<button onclick="deleteVote(${v.id})">❌</button>
</td>
</tr>
`

})

}


async function deleteVote(id){

if(!confirm("Delete vote?"))return

await supa
.from("trip_votes")
.delete()
.eq("id",id)

loadAdminVotes()
loadVotes()

}

</script>

</body>
</html>
