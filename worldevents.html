<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>World Events | Barford Golf Society</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

:root{
--green:#005a2b;
--gold:#d4af37;
--light-bg:#f7f7f5;
--card-bg:#fff;
--text-dark:#1b1b1b;
--shadow:rgba(0,0,0,0.1);
}

body{
font-family:"Inter",sans-serif;
margin:0;
background:var(--light-bg);
color:var(--text-dark);
}

/* HEADER */

.site-header{
background:#ffffff;
padding:12px 16px;
position:sticky;
top:0;
z-index:1000;
border-bottom:2px solid #c9aa4d;
box-shadow:0 2px 8px rgba(0,0,0,0.06);
}

.header-container{
max-width:1200px;
margin:0 auto;
display:flex;
flex-direction:column;
align-items:center;
gap:8px;
}

.site-title{
font-family:"Playfair Display",serif;
font-weight:700;
font-size:2rem;
color:#064d2b;
text-align:center;
}

.site-title span:last-child{
font-family:"Inter",sans-serif;
font-weight:600;
font-size:1.2rem;
}

.site-nav ul{
list-style:none;
display:flex;
flex-wrap:wrap;
gap:12px;
padding:0;
margin:0;
justify-content:center;
}

.site-nav a{
color:#222;
text-decoration:none;
font-weight:600;
font-size:0.95rem;
}

.site-nav a.active{
font-weight:700;
color:#064d2b;
}

/* PAGE */

.container{
max-width:900px;
margin:2rem auto;
padding:0 1rem;
}

.event-card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 8px var(--shadow);
margin-bottom:25px;
}

.vote-count{
display:flex;
gap:20px;
font-weight:700;
margin-top:10px;
}

.yes{color:#006d2c;}
.no{color:#b30000;}

input,select{
width:100%;
padding:10px;
margin-top:6px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:var(--green);
color:white;
border:none;
padding:10px 16px;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#00753f;
}

.admin-btn{
background:var(--gold);
color:black;
margin-bottom:15px;
}

.admin-panel{
border:2px solid var(--gold);
padding:20px;
border-radius:10px;
background:white;
display:none;
margin-bottom:25px;
}

.vote-row{
display:flex;
justify-content:space-between;
padding:6px 0;
border-bottom:1px solid #eee;
}

iframe{
margin-top:10px;
border-radius:6px;
}

</style>
</head>

<body>

<header class="site-header">
<div class="header-container">

<h1 class="site-title">
<span>Barford</span>
<span>GOLF SOCIETY</span>
</h1>

<nav class="site-nav">
<ul>
<li><a href="index.html">Home</a></li>
<li><a href="events.html">Events</a></li>
<li><a href="scores.html">Scores</a></li>
<li><a href="shop.html">Shop</a></li>
<li><a href="gallery.html">Gallery</a></li>
<li><a href="worldevents.html" class="active">World Events</a></li>
<li><a href="about.html">About Us</a></li>
<li><a href="signup.html">Sign Up</a></li>
</ul>
</nav>

</div>
</header>

<div class="container">

<h2>🌍 World Golf Events</h2>

<button class="admin-btn" onclick="toggleAdmin()">🔐 Admin Access</button>

<div id="adminPanel" class="admin-panel">

<h3>Create New Trip Event</h3>

<label>Event Name</label>
<input id="eventName">

<label>YouTube Embed Link</label>
<input id="videoLink" placeholder="https://www.youtube.com/embed/...">

<button onclick="createEvent()">Create Event</button>

<hr>

<div id="adminVotes"></div>

</div>

<div id="eventList"></div>

</div>

<script>

const ADMIN_PASSWORD = "westbrom1997";

const supa_URL = "https://tzzkgfehtnuizamzlbgr.supabase.co";
const supa_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR6emtnZmVodG51aXphbXpsYmdyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjI0MzY5ODAsImV4cCI6MjA3ODAxMjk4MH0.2mf4RMbJJvPo0NApywlrDyHuqAMfMyEWxgOS2ZSP4KQ";

const { createClient } = supabase;
const supa = createClient(supa_URL, supa_KEY);

window.onload = () => {
loadEvents();
};

async function loadEvents(){

const { data:events } = await supa
.from("trip_events")
.select("*")
.order("created_at",{ascending:false});

const container=document.getElementById("eventList");
container.innerHTML="";

for(const ev of events){

const { data:votes } = await supa
.from("trip_votes")
.select("*")
.eq("event_id",ev.id);

let yes=0;
let no=0;

votes?.forEach(v=>{
if(v.vote==="yes") yes++;
if(v.vote==="no") no++;
});

container.innerHTML+=`

<div class="event-card">

<h3>${ev.name}</h3>

${ev.video ? `
<iframe width="100%" height="300"
src="${ev.video}"
frameborder="0"
allowfullscreen></iframe>
` : ""}

<div class="vote-count">
<span class="yes">👍 Interested: ${yes}</span>
<span class="no">👎 Not Interested: ${no}</span>
</div>

<form onsubmit="submitVote(event,${ev.id})">

<label>Your Name</label>
<input id="name_${ev.id}" required>

<label>Interested?</label>
<select id="vote_${ev.id}" required>
<option value="">Select</option>
<option value="yes">Yes</option>
<option value="no">No</option>
</select>

<button type="submit">Submit Vote</button>

</form>

</div>

`;

}

}

async function submitVote(e,eventId){

e.preventDefault();

const name=document.getElementById("name_"+eventId).value.trim();
const vote=document.getElementById("vote_"+eventId).value;

await supa.from("trip_votes").insert([{
event_id:eventId,
name,
vote
}]);

loadEvents();
loadAdminVotes();

}

function toggleAdmin(){

const isAdmin=localStorage.getItem("isAdmin");

if(!isAdmin){

const pass=prompt("Enter admin password");

if(pass!==ADMIN_PASSWORD){
alert("Wrong password");
return;
}

localStorage.setItem("isAdmin",true);
document.getElementById("adminPanel").style.display="block";
loadAdminVotes();

}else{

localStorage.removeItem("isAdmin");
document.getElementById("adminPanel").style.display="none";

}

}

async function createEvent(){

const name=document.getElementById("eventName").value;
const video=document.getElementById("videoLink").value;

await supa.from("trip_events").insert([{
name,
video
}]);

document.getElementById("eventName").value="";
document.getElementById("videoLink").value="";

loadEvents();
loadAdminVotes();

}

async function loadAdminVotes(){

const { data:events } = await supa.from("trip_events").select("*");

const area=document.getElementById("adminVotes");
area.innerHTML="";

for(const ev of events){

const { data:votes } = await supa
.from("trip_votes")
.select("*")
.eq("event_id",ev.id);

area.innerHTML+=`<h3>${ev.name}</h3>`;

votes?.forEach(v=>{

area.innerHTML+=`

<div class="vote-row">
<span>${v.name} — ${v.vote}</span>
<button onclick="deleteVote(${v.id})">❌</button>
</div>

`;

});

}

}

async function deleteVote(id){

if(!confirm("Delete vote?")) return;

await supa
.from("trip_votes")
.delete()
.eq("id",id);

loadAdminVotes();
loadEvents();

}

</script>

</body>
</html>
