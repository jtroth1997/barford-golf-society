<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>World Events | Barford Golf Society</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

:root {
--green:#005a2b;
--gold:#d4af37;
--light-bg:#f7f7f5;
--shadow:rgba(0,0,0,0.1);
}

/* HEADER */

.site-header{
background:#ffffff;
padding:12px 16px;
position:sticky;
top:0;
z-index:1000;
border-bottom:2px solid #c9aa4d;
box-shadow:0 2px 8px rgba(0,0,0,0.06);
}

.header-container{
max-width:1200px;
margin:0 auto;
display:flex;
flex-direction:column;
align-items:center;
gap:8px;
}

.site-title{
font-family:"Playfair Display",serif;
font-weight:700;
font-size:2rem;
color:#064d2b;
text-align:center;
line-height:1.2;
}

.site-title span:last-child{
font-family:"Inter",sans-serif;
font-weight:600;
font-size:1.2rem;
letter-spacing:0.04rem;
}

.site-nav ul{
list-style:none;
display:flex;
flex-wrap:wrap;
gap:12px;
padding:0;
margin:0;
justify-content:center;
}

.site-nav a{
color:#222;
text-decoration:none;
font-weight:600;
font-size:0.95rem;
position:relative;
}

.site-nav a.active{
font-weight:700;
color:#064d2b;
}

.site-nav a.active::after{
content:"";
position:absolute;
bottom:-4px;
left:0;
width:100%;
height:2px;
background:#c9aa4d;
}

/* PAGE */

body{
font-family:"Inter",sans-serif;
margin:0;
background:var(--light-bg);
}

.container{
max-width:900px;
margin:2rem auto;
padding:0 1rem;
}

.event-card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 8px var(--shadow);
margin-bottom:25px;
}

.vote-count{
display:flex;
gap:20px;
font-weight:700;
margin-top:10px;
}

.yes{color:#006d2c;}
.no{color:#b30000;}

input,select{
width:100%;
padding:10px;
margin-top:6px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:var(--green);
color:white;
border:none;
padding:10px 16px;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#00753f;
}

.admin-btn{
background:var(--gold);
color:black;
margin-bottom:15px;
}

.admin-panel{
border:2px solid var(--gold);
padding:20px;
border-radius:10px;
background:white;
display:none;
margin-bottom:25px;
}

video{
width:100%;
margin-top:10px;
border-radius:6px;
}

</style>
</head>

<body>

<header class="site-header">
<div class="header-container">

<h1 class="site-title">
<span>Barford</span>
<span>GOLF SOCIETY</span>
</h1>

<nav class="site-nav">
<ul>
<li><a href="index.html">Home</a></li>
<li><a href="events.html">Events</a></li>
<li><a href="scores.html">Scores</a></li>
<li><a href="shop.html">Shop</a></li>
<li><a href="gallery.html">Gallery</a></li>
<li><a href="worldevents.html" class="active">World Events</a></li>
<li><a href="about.html">About Us</a></li>
<li><a href="signup.html">Sign Up</a></li>
</ul>
</nav>

</div>
</header>

<div class="container">

<h2>🌍 World Golf Events</h2>

<button class="admin-btn" onclick="toggleAdmin()">🔐 Admin Access</button>

<div id="adminPanel" class="admin-panel">

<h3>Create New Trip Event</h3>

<label>Event Name</label>
<input id="eventName">

<label>Upload Video</label>
<input type="file" id="videoFile" accept="video/*">

<button onclick="createTripEvent()">Create Event</button>

</div>

<div id="eventList"></div>

</div>

<script>

const ADMIN_PASSWORD="westbrom1997"

const supa_URL="https://tzzkgfehtnuizamzlbgr.supabase.co"
const supa_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR6emtnZmVodG51aXphbXpsYmdyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjI0MzY5ODAsImV4cCI6MjA3ODAxMjk4MH0.2mf4RMbJJvPo0NApywlrDyHuqAMfMyEWxgOS2ZSP4KQ"

const {createClient}=supabase
const supa=createClient(supa_URL,supa_KEY)

window.onload=loadEvents

async function loadEvents(){

const { data: events, error } = await supa
.from("trip_events")
.select("*")
.order("created_at",{ascending:false})

if(error){
console.error("Supabase error:",error)
return
}

if(!events || events.length===0){
document.getElementById("eventList").innerHTML="<p>No events yet.</p>"
return
}

const container=document.getElementById("eventList")
container.innerHTML=""

for(const ev of events){

const {data:votes}=await supa
.from("trip_votes")
.select("*")
.eq("event_id",ev.id)

let yes=0
let no=0

votes?.forEach(v=>{
if(v.vote==="yes") yes++
if(v.vote==="no") no++
})

container.innerHTML+=`

<div class="event-card">

<h3>${ev.name}</h3>

${ev.video ? `
<video controls>
<source src="${ev.video}">
</video>` : ""}

<div class="vote-count">
<span class="yes">👍 Interested: ${yes}</span>
<span class="no">👎 Not Interested: ${no}</span>
</div>

<form onsubmit="submitVote(event,${ev.id})">

<label>Your Name</label>
<input id="name_${ev.id}" required>

<label>Interested?</label>
<select id="vote_${ev.id}" required>
<option value="">Select</option>
<option value="yes">Yes</option>
<option value="no">No</option>
</select>

<button type="submit">Submit Vote</button>

</form>

</div>
`

}

}

async function submitVote(e,eventId){

e.preventDefault()

const name=document.getElementById("name_"+eventId).value
const vote=document.getElementById("vote_"+eventId).value

await supa.from("trip_votes").insert([{
event_id:eventId,
name,
vote
}])

loadEvents()

}

function toggleAdmin(){

const isAdmin=localStorage.getItem("isAdmin")

if(!isAdmin){

const pass=prompt("Enter admin password")

if(pass!==ADMIN_PASSWORD){
alert("Wrong password")
return
}

localStorage.setItem("isAdmin",true)
document.getElementById("adminPanel").style.display="block"

}else{

localStorage.removeItem("isAdmin")
document.getElementById("adminPanel").style.display="none"

}

}

async function createTripEvent(){

const name = document.getElementById("eventName").value.trim()
const file = document.getElementById("videoFile").files[0]

if(!name || !file){
alert("Enter name and upload video")
return
}

const fileName = Date.now()+"_"+file.name

// Upload video
const { data:uploadData, error:uploadError } = await supa.storage
.from("trip-videos")
.upload(fileName,file)

if(uploadError){
console.error(uploadError)
alert("Upload failed: "+uploadError.message)
return
}

// Get public URL
const { data:urlData } = supa.storage
.from("trip-videos")
.getPublicUrl(fileName)

const videoUrl = urlData.publicUrl

// Insert event
const { error:insertError } = await supa
.from("trip_events")
.insert([{
name:name,
video:videoUrl
}])

if(insertError){
console.error(insertError)
alert("Database insert failed")
return
}

// Reset form
document.getElementById("eventName").value=""
document.getElementById("videoFile").value=""

alert("Event created!")

loadEvents()

}
</script>

</body>
</html>
