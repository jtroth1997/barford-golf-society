<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barford Golf Society Handicap Calculator</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  font-family: "Inter", sans-serif;
  background: #f5f5f5;
  margin: 0;
  padding: 0;
}
header {
  background: #083d0b;
  color: #d4af37;
  text-align: center;
  padding: 20px;
  font-size: 1.5rem;
}
.topbar {
  padding: 10px;
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
}
button {
  padding: 8px 12px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
  font-weight: bold;
}
input {
  padding: 6px;
}
table {
  width: 95%;
  margin: auto;
  border-collapse: collapse;
  background: white;
}
th, td {
  padding: 10px;
  border-bottom: 1px solid #ddd;
  text-align: center;
}
th {
  background: #083d0b;
  color: #d4af37;
}
</style>
</head>

<body>

<header>⛳ Barford Golf Society</header>

<div class="topbar">
<input type="password" id="pwInput" placeholder="Password">
<button onclick="unlockInputs()">Unlock</button>
<button onclick="calculateHandicaps()">Calculate</button>
</div>

<table>
<thead>
<tr>
<th>Player</th>
<th>HCP</th>
<th>Points</th>
<th>Adj</th>
<th>Next HCP</th>
</tr>
</thead>
<tbody id="playersTable"></tbody>
</table>

<script>
const SUPABASE_URL = "https://tzzkgfehtnuizamzlbgr.supabase.co";
const SUPABASE_ANON_KEY = "YOUR_KEY";
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let PASSWORD = "westbrom1997";
let unlocked = false;

let players = [];
let currentHcp = [];
let nextHcp = [];
let lastAdj = [];
let scores = [];

function unlockInputs(){
  if(document.getElementById("pwInput").value !== PASSWORD){
    alert("Wrong password");
    return;
  }
  unlocked = true;
  render();
}

async function load(){
  const { data } = await supabase.from("players").select("*");
  players = data.map(p => p.name);

  currentHcp = players.map(()=>10);
  nextHcp = players.map(()=>null);
  lastAdj = players.map(()=> "");
  scores = players.map(()=> null);

  render();
}

function render(){
  const tbody = document.getElementById("playersTable");
  tbody.innerHTML = "";

  players.forEach((p,i)=>{
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${p}</td>
      <td><input type="number" id="hcp_${i}" value="${currentHcp[i]}" ${unlocked?"":"disabled"}></td>
      <td><input type="number" id="pts_${i}" ${unlocked?"":"disabled"}></td>
      <td>${lastAdj[i]}</td>
      <td>${nextHcp[i] ?? ""}</td>
    `;
    tbody.appendChild(tr);
  });
}

async function calculateHandicaps(){
  if(!unlocked) return alert("Unlock required");

  console.log("=== New Handicap System Round", currentRound);

  let roundScores = [];

  // STEP 1 — Collect scores
  for(let i=0; i<players.length; i++){
    const ptsVal = parseInt(document.getElementById(`pts_${i}`)?.value);
    if(!isNaN(ptsVal)){
      roundScores.push(ptsVal);
    }
  }

  if(roundScores.length < 4){
    return alert("Minimum 4 players required for handicap calculation");
  }

  // STEP 2 — Calculate average
  const avg = Math.round(roundScores.reduce((a,b)=>a+b,0) / roundScores.length);
  console.log("Round Average:", avg);

  // STEP 3–6 — Process each player
  for(let i=0; i<players.length; i++){
    const hcpVal = parseFloat(document.getElementById(`hcp_${i}`)?.value) || 0;
    const ptsVal = parseInt(document.getElementById(`pts_${i}`)?.value);

    if(isNaN(ptsVal)){
      lastAdj[i] = "";
      nextHcp[i] = null;
      continue;
    }

    const diff = ptsVal - avg;

    // STEP 3 — Base Adjustment
    let baseAdj = 0;

    if(diff >= 10) baseAdj = -4;
    else if(diff >= 8) baseAdj = -3;
    else if(diff >= 6) baseAdj = -2;
    else if(diff >= 4) baseAdj = -1;
    else if(diff >= 2) baseAdj = -0.5;
    else if(diff >= -1) baseAdj = 0;
    else if(diff >= -3) baseAdj = +0.5;
    else if(diff >= -5) baseAdj = +1;
    else if(diff >= -7) baseAdj = +2;
    else if(diff >= -9) baseAdj = +3;
    else baseAdj = +4;

    // STEP 5 — Handicap scaling
    let multiplier = 1;

    if(hcpVal <= 9) multiplier = 0.5;
    else if(hcpVal <= 18) multiplier = 0.75;
    else if(hcpVal <= 28) multiplier = 1.0;
    else multiplier = 1.25;

    let scaledAdj = baseAdj * multiplier;

    // Round to nearest 0.5
    scaledAdj = Math.round(scaledAdj * 2) / 2;

    // STEP 6 — Caps
    if(scaledAdj < -3) scaledAdj = -3;
    if(scaledAdj > 2) scaledAdj = 2;

    // Apply results
    lastAdj[i] = scaledAdj > 0 ? `+${scaledAdj}` : `${scaledAdj}`;
    nextHcp[i] = Math.max(0, hcpVal + scaledAdj);

    playerScores[i][currentRound-1] = ptsVal;
    currentHcp[i] = hcpVal;

    console.log(players[i], {
      score: ptsVal,
      diff,
      baseAdj,
      multiplier,
      scaledAdj,
      newHcp: nextHcp[i]
    });
  }

  // SAVE TO DATABASE (unchanged)
  const updates = players.map((name,i)=>{
    const vals = playerScores[i].filter(v => v!=null).sort((a,b)=>b - a).slice(0,5);
    const total = vals.reduce((a,b)=>a+b,0);

    return {
      player: name,
      round: currentRound,
      handicap: currentHcp[i],
      points: playerScores[i][currentRound - 1],
      adj: parseFloat(lastAdj[i]) || 0,
      next_handicap: nextHcp[i],
      total: total
    };
  });

  const { error } = await supabaseClient
    .from("scores")
    .upsert(updates, { onConflict:["player","round"] });

  if(error){
    console.error("Upsert error:", error);
    alert("⚠️ Error saving data");
  } else {
    showToast("✅ Scores & handicaps updated");
  }

  // Trophy logic (unchanged)
  trophies = players.map(()=>0);

  for(let rn=1; rn<=currentRound; rn++){
    let top=-Infinity, winIdx=-1;

    players.forEach((_,i)=>{
      const pts = playerScores[i][rn - 1];
      if(pts != null && pts > top){
        top = pts;
        winIdx = i;
      }
    });

    if(winIdx >= 0) trophies[winIdx]++;
  }

  renderLeaderboard();
  renderStatsGrid();

  console.log("=== Calculation Complete ===");
}
</script>

</body>
</html>
