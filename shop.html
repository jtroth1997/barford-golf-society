<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop | Barford Golf Society</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root {
  --green:#064d2b;
  --gold:#d4af37;
  --light:#f7f7f5;
}
body { font-family:"Inter",sans-serif; background:var(--light); margin:0; }
.container { max-width:1200px; margin:40px auto; padding:0 20px; }
h2 { color:var(--green); }
.admin-btn { background:var(--gold); padding:.6rem 1rem; border:none; border-radius:8px; cursor:pointer; }
.hidden { display:none; }
table { width:100%; border-collapse:collapse; margin-top:20px; background:#fff; }
th,td { padding:10px; border-bottom:1px solid #ddd; text-align:left; }
th { background:#f3f3f3; }
img { width:60px; border-radius:6px; }
button { background:var(--green); color:#fff; border:none; padding:.5rem .8rem; border-radius:6px; cursor:pointer; }
button:hover { opacity:.9; }
input,select { padding:.4rem; margin-top:5px; }
.delivered { background:#d4edda; }
#basketPanel { background:#fff; padding:20px; margin-top:20px; border:1px solid #ddd; }
</style>
</head>
<body>

<div class="container">

<button class="admin-btn" onclick="toggleAdmin()">🔐 Admin Access</button>

<button onclick="toggleBasket()" style="float:right;">🛒 Basket (<span id="basketCount">0</span>)</button>

<h2>What are you selling?</h2>

<select onchange="loadCategory(this.value)">
<option value="">Select Category</option>
<option value="balls">Balls</option>
</select>

<div id="productArea"></div>

<div id="basketPanel" class="hidden">
  <h3>Your Basket</h3>
  <div id="basketItems"></div>
  <h4>Total: £<span id="basketTotal">0.00</span></h4>
  <input id="customerName" placeholder="Your Name">
  <button onclick="checkout()">Reserve Items</button>
</div>

<div id="adminPanel" class="hidden">

<hr>
<h3>Add Product</h3>
<input id="pCategory" placeholder="Category (balls)">
<input id="pName" placeholder="Name">
<input id="pDesc" placeholder="Description">
<input id="pGrade" placeholder="Grade">
<input id="pPack" type="number" placeholder="Pack Size">
<input id="pStock" type="number" placeholder="Packs Left">
<input id="pPrice" type="number" step="0.01" placeholder="Price">
<input id="pImage" placeholder="Image URL">
<button onclick="addProduct()">Add Product</button>

<hr>
<h3>Orders Management</h3>
<button onclick="loadOrders()">Load Orders</button>
<div id="ordersArea"></div>

</div>
</div>

<script>
const ADMIN_PASSWORD="westbrom1997";

const SUPA_URL="https://tzzkgfehtnuizamzlbgr.supabase.co";
const SUPA_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR6emtnZmVodG51aXphbXpsYmdyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjI0MzY5ODAsImV4cCI6MjA3ODAxMjk4MH0.2mf4RMbJJvPo0NApywlrDyHuqAMfMyEWxgOS2ZSP4KQ";

const { createClient } = window.supabase;
const supa = createClient(SUPA_URL,SUPA_KEY);

let basket = JSON.parse(localStorage.getItem("basket") || "[]");

function toggleAdmin(){
  const isAdmin=localStorage.getItem("shopAdmin")==="true";
  if(!isAdmin){
    const pass=prompt("Password:");
    if(pass===ADMIN_PASSWORD){
      localStorage.setItem("shopAdmin","true");
      document.getElementById("adminPanel").classList.remove("hidden");
    }
  } else {
    localStorage.removeItem("shopAdmin");
    document.getElementById("adminPanel").classList.add("hidden");
  }
}

function toggleBasket(){
  document.getElementById("basketPanel").classList.toggle("hidden");
  updateBasketUI();
}

function updateBasketUI(){
  document.getElementById("basketCount").innerText=basket.length;
  const itemsDiv=document.getElementById("basketItems");
  if(!basket.length){
    itemsDiv.innerHTML="<p>No items in basket.</p>";
    document.getElementById("basketTotal").innerText="0.00";
    return;
  }
  let total=0;
  let html="<table><tr><th>Product</th><th>Qty</th><th>£</th><th></th></tr>";
  basket.forEach((item,index)=>{
    total+=item.price*item.quantity;
    html+=`<tr>
      <td>${item.name}</td>
      <td>${item.quantity}</td>
      <td>£${(item.price*item.quantity).toFixed(2)}</td>
      <td><button onclick="removeFromBasket(${index})">❌</button></td>
    </tr>`;
  });
  html+="</table>";
  itemsDiv.innerHTML=html;
  document.getElementById("basketTotal").innerText=total.toFixed(2);
}

function removeFromBasket(index){
  basket.splice(index,1);
  localStorage.setItem("basket",JSON.stringify(basket));
  updateBasketUI();
}

async function loadCategory(cat){
  if(!cat) return;
  const {data}=await supa.from("products").select("*").eq("category",cat).eq("active",true);
  let html="<table><tr><th>Image</th><th>Name/Description</th><th>Grade</th><th>Pack</th><th>Stock</th><th>Price</th><th></th></tr>";
  data.forEach(p=>{
    html+=`<tr>
      <td><img src="${p.image||'https://via.placeholder.com/60'}"></td>
      <td><strong>${p.name}</strong><br>${p.description||''}</td>
      <td>${p.grade||''}</td>
      <td>${p.pack_size||''}</td>
      <td>${p.packs_left}</td>
      <td>£${p.price}</td>
      <td>
        <input type="number" min="1" max="${p.packs_left}" value="1" id="qty_${p.id}">
        <button onclick="addToBasket(${p.id},'${p.name}',${p.price},'${p.category}')">Add</button>
      </td>
    </tr>`;
  });
  html+="</table>";
  document.getElementById("productArea").innerHTML=html;
}

function addToBasket(id,name,price,category){
  const qty=parseInt(document.getElementById(`qty_${id}`).value);
  if(!qty||qty<=0) return alert("Invalid quantity");
  basket.push({product_id:id,name,price,quantity:qty,category});
  localStorage.setItem("basket",JSON.stringify(basket));
  updateBasketUI();
  alert("Added to basket");
}

async function checkout(){
  if(!basket.length) return alert("Basket empty");
  const customer=document.getElementById("customerName").value.trim();
  if(!customer) return alert("Enter your name");

  for(const item of basket){
    const {data:product}=await supa.from("products").select("*").eq("id",item.product_id).single();
    if(product.packs_left<item.quantity){
      return alert(`Not enough stock for ${item.name}`);
    }
  }

  for(const item of basket){
    await supa.from("shop_orders").insert([{
      product_id:item.product_id,
      product_name:item.name,
      quantity:item.quantity,
      price:item.price,
      customer_name:customer
    }]);

    const {data:product}=await supa.from("products").select("*").eq("id",item.product_id).single();
    await supa.from("products")
      .update({packs_left:product.packs_left-item.quantity})
      .eq("id",item.product_id);
  }

  alert("Reserved! Bring payment to next event.");
  basket=[];
  localStorage.removeItem("basket");
  updateBasketUI();
  loadCategory("balls");
}

async function addProduct(){
  await supa.from("products").insert([{
    category:pCategory.value,
    name:pName.value,
    description:pDesc.value,
    grade:pGrade.value,
    pack_size:pPack.value,
    packs_left:pStock.value,
    price:pPrice.value,
    image:pImage.value
  }]);
  alert("Product added");
}

async function loadOrders(){
  const {data}=await supa.from("shop_orders").select("*").order("created_at",{ascending:false});
  let html="<table><tr><th>Name</th><th>Product</th><th>Qty</th><th>£</th><th>Status</th><th>Actions</th></tr>";
  data.forEach(o=>{
    html+=`<tr class="${o.delivered?'delivered':''}">
      <td>${o.customer_name}</td>
      <td>${o.product_name}</td>
      <td>${o.quantity}</td>
      <td>£${(o.price*o.quantity).toFixed(2)}</td>
      <td>${o.delivered?'Delivered':'Pending'}</td>
      <td>
        <button onclick="markDelivered(${o.id})">✔</button>
        <button onclick="cancelOrder(${o.id},${o.product_id},${o.quantity})">❌</button>
      </td>
    </tr>`;
  });
  html+="</table>";
  document.getElementById("ordersArea").innerHTML=html;
}

async function markDelivered(id){
  await supa.from("shop_orders").update({delivered:true}).eq("id",id);
  loadOrders();
}

async function cancelOrder(orderId,productId,qty){
  if(!confirm("Cancel order?")) return;

  const {data:product}=await supa.from("products").select("*").eq("id",productId).single();
  await supa.from("products")
    .update({packs_left:product.packs_left+qty})
    .eq("id",productId);

  await supa.from("shop_orders").delete().eq("id",orderId);
  loadOrders();
}
</script>

</body>
</html>
