<!DOCTYPE html>
<html lang="en">
<head> 
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop | Barford Golf Society</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --green:#005a2b;
  --gold:#d4af37;
  --light:#f4f4f4;
}
body{
  font-family:"Inter",sans-serif;
  margin:0;
  background:var(--light);
}
.site-header{
  background:#fff;
  border-bottom:3px solid var(--gold);
  padding:12px 0;
}
.header-container{
  max-width:1200px;
  margin:auto;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 20px;
}
.site-title{
  font-weight:700;
  font-size:1.8rem;
  color:var(--green);
}
.site-nav ul{
  list-style:none;
  display:flex;
  gap:18px;
  margin:0;
  padding:0;
}
.site-nav a{
  text-decoration:none;
  font-weight:600;
  color:#333;
}
.site-nav a.active{
  color:var(--green);
  border-bottom:2px solid var(--gold);
}
.container{
  max-width:1200px;
  margin:40px auto;
  padding:0 20px;
}
.shop-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.admin-btn{
  background:var(--gold);
  border:none;
  padding:8px 14px;
  border-radius:6px;
  font-weight:600;
  cursor:pointer;
}
.product-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
  gap:25px;
  margin-top:30px;
}
.product-card{
  background:#fff;
  padding:15px;
  border-radius:10px;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
  text-align:center;
}
.product-card img{
  width:100%;
  height:170px;
  object-fit:contain;
}
.product-name{
  font-weight:600;
  margin:10px 0 4px;
}
.product-price{
  font-weight:700;
  color:var(--green);
}
.product-card button{
  margin-top:8px;
  background:var(--green);
  color:#fff;
  border:none;
  padding:6px 10px;
  border-radius:5px;
  cursor:pointer;
}
#basketPanel{
  position:fixed;
  right:0;
  top:0;
  height:100%;
  width:350px;
  background:#fff;
  box-shadow:-4px 0 10px rgba(0,0,0,0.1);
  padding:20px;
  overflow-y:auto;
  transform:translateX(100%);
  transition:0.3s;
}
#basketPanel.active{
  transform:translateX(0);
}
.admin-panel{
  margin-top:50px;
  background:#fff;
  padding:20px;
  border:2px solid var(--gold);
  border-radius:10px;
  display:none;
}
.admin-panel input{
  width:100%;
  padding:8px;
  margin-bottom:10px;
}
.admin-panel button{
  background:var(--green);
  color:#fff;
  border:none;
  padding:8px 12px;
  border-radius:5px;
  cursor:pointer;
}
table{
  width:100%;
  border-collapse:collapse;
}
th,td{
  padding:6px;
  border-bottom:1px solid #ddd;
}
footer{
  text-align:center;
  padding:30px;
  margin-top:60px;
  border-top:3px solid var(--gold);
}
</style>
</head>

<body>

<header class="site-header">
  <div class="header-container">
    <div class="site-title">Barford Golf Society</div>
    <nav class="site-nav">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="events.html">Events</a></li>
        <li><a href="scores.html">Scores</a></li>
        <li><a href="shop.html" class="active">Shop</a></li>
      </ul>
    </nav>
  </div>
</header>

<div class="container">

<div class="shop-top">
  <h1>Golf Balls</h1>
  <div>
    <button onclick="toggleBasket()">🛒 Basket (<span id="basketCount">0</span>)</button>
    <button class="admin-btn" onclick="toggleAdmin()">Admin</button>
  </div>
</div>

<div id="productGrid" class="product-grid"></div>

<!-- Basket -->
<div id="basketPanel">
  <h3>Your Basket</h3>
  <div id="basketItems"></div>
  <h4>Total: £<span id="basketTotal">0.00</span></h4>

  <input id="customerName" placeholder="Your Name">
  <select id="paymentMethod">
    <option value="">Select Payment Method</option>
    <option value="Bank Transfer">Bank Transfer</option>
    <option value="Cash at Event">Cash at Next Event</option>
  </select>

  <button onclick="checkout()">Reserve Items</button>
</div>

<!-- Admin -->
<div id="adminPanel" class="admin-panel">
  <h3>Add Product</h3>
  <input id="name" placeholder="Product Name">
  <input id="description" placeholder="Description">
  <input id="price" type="number" step="0.01" placeholder="Price">
  <input id="stock" type="number" placeholder="Stock">
  <input id="image" placeholder="Image URL">
  <button onclick="addProduct()">Add Product</button>

  <hr>

  <h3>Manage Products</h3>
  <div id="adminProducts"></div>
</div>

</div>

<footer>
© 2026 Barford Golf Society
</footer>

<script>
const ADMIN_PASSWORD="westbrom1997";
const SUPA_URL="https://tzzkgfehtnuizamzlbgr.supabase.co";
const SUPA_KEY="YOUR_KEY_HERE";

const { createClient } = window.supabase;
const supa = createClient(SUPA_URL,SUPA_KEY);

let basket=[];
let productsCache=[];

window.onload=loadProducts;

function toggleBasket(){
  document.getElementById("basketPanel").classList.toggle("active");
}

function toggleAdmin(){
  const pass=prompt("Admin password:");
  if(pass===ADMIN_PASSWORD){
    document.getElementById("adminPanel").style.display="block";
    loadAdminProducts();
    loadOrders();
  }
}

async function loadProducts(){
  const {data,error}=await supa.from("products")
    .select("*")
    .eq("active",true);

  if(error){ alert(error.message); return; }

  productsCache=data;

  const grid=document.getElementById("productGrid");
  grid.innerHTML="";

  data.forEach(p=>{
    grid.innerHTML+=`
      <div class="product-card">
        <img src="${p.image||'https://via.placeholder.com/200'}">
        <div class="product-name">${p.name}</div>
        <div>${p.description||''}</div>
        <div class="product-price">£${p.price}</div>
        <div>Stock: ${p.packs_left}</div>
        <button ${p.packs_left<=0?'disabled':''}
          onclick="addToBasket(${p.id},'${p.name}',${p.price})">
          ${p.packs_left<=0?'Out of Stock':'Add Pack'}
        </button>
      </div>
    `;
  });
}

function addToBasket(id,name,price){
  const existing=basket.find(x=>x.id===id);
  if(existing){
    existing.qty++;
  }else{
    basket.push({id,name,price,qty:1});
  }
  updateBasket();
}

function updateBasket(){
  document.getElementById("basketCount").innerText=basket.reduce((a,b)=>a+b.qty,0);
  let total=0;
  let html="<table>";
  basket.forEach(item=>{
    total+=item.price*item.qty;
    html+=`<tr><td>${item.name} x${item.qty}</td><td>£${(item.price*item.qty).toFixed(2)}</td></tr>`;
  });
  html+="</table>";
  document.getElementById("basketItems").innerHTML=html;
  document.getElementById("basketTotal").innerText=total.toFixed(2);
}

async function checkout(){
  const name=document.getElementById("customerName").value.trim();
  const payment=document.getElementById("paymentMethod").value;

  if(!name||!payment) return alert("Enter details");
  if(basket.length===0) return alert("Basket empty");

  for(const item of basket){

    const product=productsCache.find(p=>p.id===item.id);
    if(!product || product.packs_left < item.qty){
      alert(`Not enough stock for ${item.name}`);
      return;
    }

    // Insert order
    const {error:orderError}=await supa.from("shop_orders").insert([{
      product_id:item.id,
      product_name:item.name,
      price:item.price,
      quantity:item.qty,
      customer_name:name,
      payment_method:payment,
      delivered:false
    }]);

    if(orderError){
      alert(orderError.message);
      return;
    }

    // Reduce stock
    await supa.from("products")
      .update({packs_left: product.packs_left - item.qty})
      .eq("id",item.id);
  }

  alert("Reservation confirmed ✔️");
  basket=[];
  updateBasket();
  toggleBasket();
  loadProducts();
}

async function addProduct(){
  await supa.from("products").insert([{
    category:"balls",
    name:name.value,
    description:description.value,
    price:price.value,
    packs_left:stock.value,
    image:image.value,
    active:true
  }]);

  loadProducts();
  loadAdminProducts();
}

async function loadAdminProducts(){
  const {data}=await supa.from("products").select("*");

  let html="<table><tr><th>Name</th><th>Stock</th><th></th></tr>";
  data.forEach(p=>{
    html+=`<tr>
      <td>${p.name}</td>
      <td>${p.packs_left}</td>
      <td><button onclick="deleteProduct(${p.id})">Delete</button></td>
    </tr>`;
  });
  html+="</table>";

  document.getElementById("adminProducts").innerHTML=html;
}

async function deleteProduct(id){
  await supa.from("products")
    .update({active:false})
    .eq("id",id);

  loadProducts();
  loadAdminProducts();
}

/* ======================
   NEW: ORDER MANAGEMENT
====================== */

async function loadOrders(){
  const {data}=await supa.from("shop_orders")
    .select("*")
    .order("id",{ascending:false});

  let html="<h3>Orders</h3>";
  html+="<table><tr><th>Name</th><th>Product</th><th>Qty</th><th>Payment</th><th>Status</th></tr>";

  data.forEach(o=>{
    html+=`<tr>
      <td>${o.customer_name}</td>
      <td>${o.product_name}</td>
      <td>${o.quantity}</td>
      <td>${o.payment_method}</td>
      <td>
        ${o.delivered ? "Delivered" :
          `<button onclick="markDelivered(${o.id})">Mark Delivered</button>`
        }
      </td>
    </tr>`;
  });

  html+="</table>";

  document.getElementById("adminPanel").innerHTML+=html;
}

async function markDelivered(id){
  await supa.from("shop_orders")
    .update({delivered:true})
    .eq("id",id);

  loadOrders();
}
</script>

</body>
</html>
