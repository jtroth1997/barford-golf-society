<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop | Barford Golf Society</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root {
  --green:#064d2b;
  --gold:#d4af37;
  --light:#f7f7f5;
  --shadow:rgba(0,0,0,0.1);
}
body{
  font-family:"Inter",sans-serif;
  margin:0;
  background:var(--light);
}
.container{
  max-width:1100px;
  margin:40px auto;
  padding:0 20px;
}
h2{color:var(--green)}
.admin-btn{
  background:var(--gold);
  padding:.6rem 1rem;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
}
.admin-panel{
  background:#fff;
  border:2px solid var(--gold);
  padding:2rem;
  border-radius:10px;
  margin-bottom:2rem;
}
.hidden{display:none}
.product-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:25px;
}
.product-card{
  background:#fff;
  padding:20px;
  border-radius:12px;
  box-shadow:0 4px 12px var(--shadow);
}
.product-card img{
  width:100%;
  height:200px;
  object-fit:cover;
  border-radius:8px;
}
.price{
  font-weight:700;
  margin:10px 0;
}
input,textarea{
  width:100%;
  padding:.6rem;
  margin-top:.3rem;
  margin-bottom:1rem;
}
button{
  background:var(--green);
  color:#fff;
  border:none;
  padding:.7rem 1rem;
  border-radius:6px;
  cursor:pointer;
}
button:hover{opacity:.9}
</style>
</head>
<body>

<div class="container">

<button id="adminToggle" class="admin-btn" onclick="toggleAdmin()">🔐 Admin Access</button>

<div id="adminPanel" class="admin-panel hidden">
<h3>Manage Shop</h3>

<label>Product Name</label>
<input id="prodName">

<label>Price (£)</label>
<input id="prodPrice" type="number" step="0.01">

<label>Image URL</label>
<input id="prodImage">

<label>Description</label>
<textarea id="prodDesc"></textarea>

<button onclick="addProduct()">Add Product</button>

<hr>

<h4>Edit / Delete Products</h4>
<select id="productSelect" onchange="loadProductEdit()"></select>

<div id="editArea" class="hidden">
<label>Name</label>
<input id="editName">
<label>Price</label>
<input id="editPrice" type="number" step="0.01">
<label>Image</label>
<input id="editImage">
<label>Description</label>
<textarea id="editDesc"></textarea>
<button onclick="saveEdit()">💾 Save Changes</button>
<button onclick="deleteProduct()">❌ Delete</button>
</div>

</div>

<h2>Society Shop</h2>
<div id="productGrid" class="product-grid"></div>

</div>

<script>
const ADMIN_PASSWORD="westbrom1997";

const SUPA_URL = "https://tzzkgfehtnuizamzlbgr.supabase.co";
const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR6emtnZmVodG51aXphbXpsYmdyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjI0MzY5ODAsImV4cCI6MjA3ODAxMjk4MH0.2mf4RMbJJvPo0NApywlrDyHuqAMfMyEWxgOS2ZSP4KQ";
const {createClient}=window.supabase;
const supa=createClient(SUPA_URL,SUPA_KEY);

window.onload=()=>{
 loadProducts();
 if(localStorage.getItem("isShopAdmin")==="true"){
  document.getElementById("adminPanel").classList.remove("hidden");
 }
};

function toggleAdmin(){
 const isAdmin=localStorage.getItem("isShopAdmin")==="true";
 if(!isAdmin){
  const pass=prompt("Enter admin password:");
  if(pass===ADMIN_PASSWORD){
   localStorage.setItem("isShopAdmin","true");
   document.getElementById("adminPanel").classList.remove("hidden");
   loadProductSelect();
  }else alert("Wrong password");
 }else{
  localStorage.removeItem("isShopAdmin");
  document.getElementById("adminPanel").classList.add("hidden");
 }
}

async function loadProducts(){
 const {data}=await supa.from("products").select("*").eq("active",true).order("created_at",{ascending:false});
 const grid=document.getElementById("productGrid");
 grid.innerHTML="";
 data?.forEach(p=>{
  grid.innerHTML+=`
   <div class="product-card">
    <img src="${p.image||'https://via.placeholder.com/300'}">
    <h4>${p.name}</h4>
    <div class="price">£${p.price}</div>
    <p>${p.description||''}</p>
   </div>
  `;
 });
}

async function addProduct(){
 const name=document.getElementById("prodName").value;
 const price=document.getElementById("prodPrice").value;
 const image=document.getElementById("prodImage").value;
 const desc=document.getElementById("prodDesc").value;

 if(!name||!price)return alert("Fill required fields");

 await supa.from("products").insert([{name,price,image,description:desc}]);
 alert("Product added");
 loadProducts();
 loadProductSelect();
}

async function loadProductSelect(){
 const {data}=await supa.from("products").select("*").order("created_at",{ascending:false});
 const sel=document.getElementById("productSelect");
 sel.innerHTML="<option value=''>Select product</option>";
 data?.forEach(p=>{
  sel.innerHTML+=`<option value="${p.id}">${p.name}</option>`;
 });
}

async function loadProductEdit(){
 const id=document.getElementById("productSelect").value;
 if(!id)return;
 const {data}=await supa.from("products").select("*").eq("id",id).single();
 document.getElementById("editArea").classList.remove("hidden");
 document.getElementById("editName").value=data.name;
 document.getElementById("editPrice").value=data.price;
 document.getElementById("editImage").value=data.image;
 document.getElementById("editDesc").value=data.description;
}

async function saveEdit(){
 const id=document.getElementById("productSelect").value;
 const updates={
  name:document.getElementById("editName").value,
  price:document.getElementById("editPrice").value,
  image:document.getElementById("editImage").value,
  description:document.getElementById("editDesc").value
 };
 await supa.from("products").update(updates).eq("id",id);
 alert("Updated");
 loadProducts();
}

async function deleteProduct(){
 const id=document.getElementById("productSelect").value;
 if(!confirm("Delete product?"))return;
 await supa.from("products").update({active:false}).eq("id",id);
 alert("Deleted");
 loadProducts();
 loadProductSelect();
}
</script>

</body>
</html>
