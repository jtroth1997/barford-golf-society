<!DOCTYPE html>
<html lang="en">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barford Golf Society | Shop</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --accent: #d4af37;
  --dark: #1a1a1a;
  --white: #ffffff;
  --gray: #666666;
  --background: #f5f9fc;
  --radius: 14px;
  --bigShadow: 0 12px 40px rgba(0, 0, 0, 0.1);
}

* { box-sizing: border-box; margin:0; padding:0; }

body {
  font-family: "Inter", sans-serif;
  background: var(--background);
  color: var(--dark);
}

/* HEADER (IDENTICAL STYLE) */
.site-header {
  background: var(--white);
  padding: 18px 24px;
  position: sticky;
  top: 0;
  z-index: 1000;
  border-bottom: 1px solid #ddd;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}

.header-container {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.site-title {
  font-size: 2.3rem;
  color: var(--accent);
  display: flex;
  gap: .3rem;
  align-items: baseline;
}

.site-title span:first-child {
  font-family: 'Playfair Display', serif;
  font-size: 2.5rem;
}

.site-title span:last-child {
  font-weight: 600;
  font-size: 1.8rem;
  text-transform: uppercase;
}

.site-nav ul {
  list-style: none;
  display: flex;
  gap: 16px;
}

.site-nav a {
  text-decoration: none;
  color: var(--dark);
  font-weight: 600;
  position: relative;
}

.site-nav a.active,
.site-nav a:hover {
  color: var(--accent);
}

/* HERO */
.shop-hero {
  background: #2c6e49;
  padding: 70px 20px;
  text-align: center;
  color: white;
}

.shop-hero h2 {
  font-size: 2.6rem;
  color: var(--accent);
  margin-bottom: 12px;
}

.shop-hero p {
  font-size: 1.1rem;
}

/* PRODUCTS */
.container {
  max-width: 1100px;
  margin: 60px auto;
  padding: 0 20px;
}

.product-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 28px;
}

.product-card {
  background: white;
  padding: 24px;
  border-radius: var(--radius);
  box-shadow: var(--bigShadow);
  text-align: center;
  transition: transform .3s;
}

.product-card:hover {
  transform: translateY(-6px);
}

.product-card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  border-radius: 10px;
}

.product-card h4 {
  margin: 16px 0 8px;
  color: var(--accent);
}

.price {
  font-weight: 700;
  margin-bottom: 12px;
}

.btn {
  background: var(--accent);
  border: none;
  padding: 10px 18px;
  border-radius: var(--radius);
  font-weight: 600;
  cursor: pointer;
}

/* CART */
.cart-button {
  background: var(--accent);
  padding: 8px 14px;
  border-radius: var(--radius);
  cursor: pointer;
  font-weight: 600;
}

.cart-sidebar {
  position: fixed;
  right: -350px;
  top: 0;
  width: 320px;
  height: 100%;
  background: white;
  box-shadow: -5px 0 20px rgba(0,0,0,0.2);
  padding: 20px;
  transition: right .3s ease;
  overflow-y: auto;
}

.cart-sidebar.open {
  right: 0;
}

.cart-item {
  border-bottom: 1px solid #ddd;
  padding: 10px 0;
  display: flex;
  justify-content: space-between;
}

.cart-total {
  font-weight: 700;
  margin-top: 20px;
}

footer {
  text-align:center;
  padding: 40px 0;
  color: var(--gray);
}
</style>
</head>

<body>

<header class="site-header">
  <div class="header-container">
    <h1 class="site-title">
      <span>Barford</span>
      <span>GOLF SOCIETY</span>
    </h1>

    <nav class="site-nav">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="events.html">Events</a></li>
        <li><a href="scores.html">Scores</a></li>
        <li><a href="gallery.html">Gallery</a></li>
        <li><a href="about.html">About Us</a></li>
        <li><a href="signup.html">Sign Up</a></li>
        <li><span class="cart-button" onclick="toggleCart()">Cart (<span id="cartCount">0</span>)</span></li>
      </ul>
    </nav>
  </div>
</header>

<section class="shop-hero">
  <h2>Official Barford Shop</h2>
  <p>Premium society gear for members.</p>
</section>

<div class="container">
  <div class="product-grid" id="productGrid"></div>
</div>

<!-- CART -->
<div class="cart-sidebar" id="cartSidebar">
  <h3>Your Cart</h3>
  <div id="cartItems"></div>
  <div class="cart-total">
    Total: £<span id="cartTotal">0.00</span>
  </div>
  <br>
  <button class="btn" onclick="checkout()">Checkout</button>
</div>

<footer>
  <p>© 2026 Barford Golf Society</p>
</footer>

<script>
const products = [
  { id:1, name:"Barford Polo Shirt", price:35, image:"https://images.unsplash.com/photo-1520975922323-0c46b4b2c43f" },
  { id:2, name:"Society Golf Cap", price:18, image:"https://images.unsplash.com/photo-1586074299757-dc655f18518a" },
  { id:3, name:"Premium Golf Balls (Dozen)", price:28, image:"https://images.unsplash.com/photo-1599058917765-a780eda07a3e" },
  { id:4, name:"Barford Quarter Zip", price:55, image:"https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf" }
];

let cart = JSON.parse(localStorage.getItem("barfordCart")) || [];

function renderProducts(){
  const grid = document.getElementById("productGrid");
  grid.innerHTML = "";
  products.forEach(p=>{
    grid.innerHTML += `
      <div class="product-card">
        <img src="${p.image}" alt="${p.name}">
        <h4>${p.name}</h4>
        <div class="price">£${p.price}</div>
        <button class="btn" onclick="addToCart(${p.id})">Add to Cart</button>
      </div>
    `;
  });
}

function addToCart(id){
  const product = products.find(p=>p.id===id);
  cart.push(product);
  updateCart();
}

function updateCart(){
  localStorage.setItem("barfordCart", JSON.stringify(cart));
  const cartItems = document.getElementById("cartItems");
  cartItems.innerHTML="";
  let total=0;

  cart.forEach((item,index)=>{
    total+=item.price;
    cartItems.innerHTML += `
      <div class="cart-item">
        <span>${item.name}</span>
        <span>£${item.price}</span>
      </div>
    `;
  });

  document.getElementById("cartTotal").textContent = total.toFixed(2);
  document.getElementById("cartCount").textContent = cart.length;
}

function toggleCart(){
  document.getElementById("cartSidebar").classList.toggle("open");
}

function checkout(){
  if(cart.length===0){
    alert("Your cart is empty.");
    return;
  }
  alert("Checkout integration coming soon.");
}

renderProducts();
updateCart();
</script>

</body>
</html>
