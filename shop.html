<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop | Barford Golf Society</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --green:#005a2b;
  --gold:#d4af37;
  --light:#f4f4f4;
}

body{
  font-family:"Inter",sans-serif;
  margin:0;
  background:var(--light);
}

/* HEADER */

.site-header{
  background:#fff;
  border-bottom:3px solid var(--gold);
  padding:12px 0;
}

.header-container{
  max-width:1200px;
  margin:auto;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 20px;
}

.site-title{
  font-weight:700;
  font-size:1.8rem;
  color:var(--green);
}

.site-nav ul{
  list-style:none;
  display:flex;
  gap:18px;
  margin:0;
  padding:0;
}

.site-nav a{
  text-decoration:none;
  font-weight:600;
  color:#333;
}

.site-nav a.active{
  color:var(--green);
  border-bottom:2px solid var(--gold);
}

/* MAIN */

.container{
  max-width:1200px;
  margin:40px auto;
  padding:0 20px;
}

.shop-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:30px;
}

h1{
  margin:0;
  font-size:2rem;
  color:#222;
}

.admin-btn{
  background:var(--gold);
  border:none;
  padding:8px 14px;
  border-radius:6px;
  font-weight:600;
  cursor:pointer;
}

.product-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:25px;
}

.product-card{
  background:#fff;
  padding:15px;
  border-radius:10px;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
  text-align:center;
}

.product-card img{
  width:100%;
  height:180px;
  object-fit:contain;
}

.product-name{
  font-weight:600;
  margin:10px 0 4px;
}

.product-price{
  font-weight:700;
  color:var(--green);
  margin-bottom:10px;
}

.product-card button{
  background:var(--green);
  color:#fff;
  border:none;
  padding:6px 10px;
  border-radius:5px;
  cursor:pointer;
}

/* ADMIN PANEL */

.admin-panel{
  background:#fff;
  border:2px solid var(--gold);
  padding:20px;
  border-radius:10px;
  margin-top:40px;
  display:none;
}

.admin-panel input{
  width:100%;
  padding:8px;
  margin-bottom:10px;
}

.admin-panel button{
  background:var(--green);
  color:#fff;
  border:none;
  padding:8px 12px;
  border-radius:5px;
  cursor:pointer;
}

footer{
  text-align:center;
  padding:30px;
  margin-top:60px;
  border-top:3px solid var(--gold);
  color:#555;
}
</style>
</head>

<body>

<header class="site-header">
  <div class="header-container">
    <div class="site-title">Barford Golf Society</div>
    <nav class="site-nav">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="events.html">Events</a></li>
        <li><a href="scores.html">Scores</a></li>
        <li><a href="shop.html" class="active">Shop</a></li>
      </ul>
    </nav>
  </div>
</header>

<div class="container">

<div class="shop-top">
  <h1>Golf Balls</h1>
  <button class="admin-btn" onclick="toggleAdmin()">Admin</button>
</div>

<div id="productGrid" class="product-grid"></div>

<div id="adminPanel" class="admin-panel">
  <h3>Add Product</h3>

  <input id="name" placeholder="Product Name">
  <input id="description" placeholder="Description">
  <input id="price" type="number" step="0.01" placeholder="Price">
  <input id="stock" type="number" placeholder="Stock">
  <input id="image" placeholder="Image URL">

  <button onclick="addProduct()">Add Product</button>
</div>

</div>

<footer>
© 2026 Barford Golf Society
</footer>

<script>
const ADMIN_PASSWORD="westbrom1997";

const SUPA_URL="https://tzzkgfehtnuizamzlbgr.supabase.co";
const SUPA_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR6emtnZmVodG51aXphbXpsYmdyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjI0MzY5ODAsImV4cCI6MjA3ODAxMjk4MH0.2mf4RMbJJvPo0NApywlrDyHuqAMfMyEWxgOS2ZSP4KQ";

const { createClient } = window.supabase;
const supa = createClient(SUPA_URL,SUPA_KEY);

window.onload=loadProducts;

function toggleAdmin(){
  const pass=prompt("Enter admin password:");
  if(pass===ADMIN_PASSWORD){
    document.getElementById("adminPanel").style.display="block";
  } else alert("Wrong password");
}

async function loadProducts(){
  const {data,error}=await supa
    .from("products")
    .select("*")
    .eq("active",true)
    .order("created_at",{ascending:false});

  if(error){
    console.error(error);
    return;
  }

  const grid=document.getElementById("productGrid");
  grid.innerHTML="";

  data.forEach(p=>{
    grid.innerHTML+=`
      <div class="product-card">
        <img src="${p.image || 'https://via.placeholder.com/200'}">
        <div class="product-name">${p.name}</div>
        <div>${p.description || ''}</div>
        <div class="product-price">£${p.price}</div>
        <div>Stock: ${p.packs_left}</div>
      </div>
    `;
  });
}

async function addProduct(){

  const product={
    category:"balls",
    name:name.value,
    description:description.value,
    price:parseFloat(price.value),
    packs_left:parseInt(stock.value),
    image:image.value,
    active:true
  };

  const {error}=await supa.from("products").insert([product]);

  if(error){
    console.error(error);
    alert("Error adding product");
    return;
  }

  alert("Product added");
  loadProducts();

  name.value="";
  description.value="";
  price.value="";
  stock.value="";
  image.value="";
}
</script>

</body>
</html>
