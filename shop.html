<!DOCTYPE html>
<html lang="en">
<head> 
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop | Barford Golf Society</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --green:#005a2b;
  --gold:#d4af37;
  --light:#f4f4f4;
}
body{
  font-family:"Inter",sans-serif;
  margin:0;
  background:var(--light);
}
.site-header{
  background:#fff;
  border-bottom:3px solid var(--gold);
  padding:12px 0;
}
.header-container{
  max-width:1200px;
  margin:auto;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 20px;
}
.site-title{
  font-weight:700;
  font-size:1.8rem;
  color:var(--green);
}
.site-nav ul{
  list-style:none;
  display:flex;
  gap:18px;
  margin:0;
  padding:0;
}
.site-nav a{
  text-decoration:none;
  font-weight:600;
  color:#333;
}
.site-nav a.active{
  color:var(--green);
  border-bottom:2px solid var(--gold);
}
.container{
  max-width:1200px;
  margin:40px auto;
  padding:0 20px;
}
.shop-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.admin-btn{
  background:var(--gold);
  border:none;
  padding:8px 14px;
  border-radius:6px;
  font-weight:600;
  cursor:pointer;
}
.product-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
  gap:25px;
  margin-top:30px;
}
.product-card{
  background:#fff;
  padding:15px;
  border-radius:10px;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
  text-align:center;
}
.product-card img{
  width:100%;
  height:170px;
  object-fit:contain;
}
.product-name{
  font-weight:600;
  margin:10px 0 4px;
}
.product-price{
  font-weight:700;
  color:var(--green);
}
.product-card button{
  margin-top:8px;
  background:var(--green);
  color:#fff;
  border:none;
  padding:6px 10px;
  border-radius:5px;
  cursor:pointer;
}
#basketPanel{
  position:fixed;
  right:0;
  top:0;
  height:100%;
  width:350px;
  background:#fff;
  box-shadow:-4px 0 10px rgba(0,0,0,0.1);
  padding:20px;
  overflow-y:auto;
  transform:translateX(100%);
  transition:0.3s;
}
#basketPanel.active{
  transform:translateX(0);
}
.admin-panel{
  margin-top:50px;
  background:#fff;
  padding:20px;
  border:2px solid var(--gold);
  border-radius:10px;
  display:none;
}
.admin-panel input{
  width:100%;
  padding:8px;
  margin-bottom:10px;
}
.admin-panel button{
  background:var(--green);
  color:#fff;
  border:none;
  padding:8px 12px;
  border-radius:5px;
  cursor:pointer;
}
table{
  width:100%;
  border-collapse:collapse;
}
th,td{
  padding:6px;
  border-bottom:1px solid #ddd;
}
footer{
  text-align:center;
  padding:30px;
  margin-top:60px;
  border-top:3px solid var(--gold);
}
  .basket-btn{
  background: var(--green);
  color: #fff;
  font-size: 1.1rem;
  font-weight: 700;
  padding: 14px 22px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  box-shadow: 0 6px 18px rgba(0,0,0,0.15);
  transition: all 0.2s ease;
}

.basket-btn:hover{
  transform: translateY(-2px);
  box-shadow: 0 8px 22px rgba(0,0,0,0.2);
}

.basket-btn:active{
  transform: translateY(0px);
  box-shadow: 0 4px 14px rgba(0,0,0,0.15);
}
</style>
</head>

<body>

<header class="site-header">
  <div class="header-container">
    <div class="site-title">Barford Golf Society</div>
    <nav class="site-nav">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="events.html">Events</a></li>
        <li><a href="scores.html">Scores</a></li>
        <li><a href="shop.html" class="active">Shop</a></li>
      </ul>
    </nav>
  </div>
</header>

<div class="container">

<div class="shop-top">
  <h1>Golf Balls</h1>
  <div>
    <button class="basket-btn" onclick="toggleBasket()">
  🛒 Basket (<span id="basketCount">0</span>)
</button>
    <button class="admin-btn" onclick="toggleAdmin()">Admin</button>
  </div>
</div>

<div id="productGrid" class="product-grid"></div>

<!-- Basket -->
<div id="basketPanel">
  <h3>Your Basket</h3>
  <div id="basketItems"></div>
  <h4>Total: £<span id="basketTotal">0.00</span></h4>

  <input id="customerName" placeholder="Your Name">
  <select id="paymentMethod">
    <option value="">Select Payment Method</option>
    <option value="Bank Transfer">Bank Transfer</option>
    <option value="Cash at Event">Cash at Next Event</option>
  </select>

  <button onclick="checkout()">Reserve Items</button>
</div>

<!-- Admin -->
<div id="adminPanel" class="admin-panel">
  <h3>Add Product</h3>
  <input id="name" placeholder="Product Name">
  <input id="description" placeholder="Description">
  <input id="price" type="number" step="0.01" placeholder="Price">
  <input id="stock" type="number" placeholder="Stock">
  <input id="image" placeholder="Image URL">
  <button onclick="addProduct()">Add Product</button>

  <h3>Manage Products</h3>
<div id="adminProducts"></div>

<hr>

<div id="ordersContainer"></div>
</div>

</div>

<footer>
© 2026 Barford Golf Society
</footer>

<script>
const ADMIN_PASSWORD="westbrom1997";
const SUPA_URL="https://tzzkgfehtnuizamzlbgr.supabase.co";
const SUPA_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR6emtnZmVodG51aXphbXpsYmdyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjI0MzY5ODAsImV4cCI6MjA3ODAxMjk4MH0.2mf4RMbJJvPo0NApywlrDyHuqAMfMyEWxgOS2ZSP4KQ";

const { createClient } = window.supabase;
const supa = createClient(SUPA_URL,SUPA_KEY);

let basket=[];
let productsCache=[];

window.onload=loadProducts;

function toggleBasket(){
  document.getElementById("basketPanel").classList.toggle("active");
}

function toggleAdmin(){
  const pass=prompt("Admin password:");
  if(pass===ADMIN_PASSWORD){
    document.getElementById("adminPanel").style.display="block";
    loadAdminProducts();
    loadOrders();
  }
}

async function loadProducts(){
  const {data,error}=await supa.from("products")
    .select("*")
    .eq("active",true);

  if(error){ alert(error.message); return; }

  productsCache=data;

  const grid=document.getElementById("productGrid");
  grid.innerHTML="";

  data.forEach(p=>{
    grid.innerHTML+=`
      <div class="product-card">
        <img src="${p.image||'https://via.placeholder.com/200'}">
        <div class="product-name">${p.name}</div>
        <div>${p.description||''}</div>
        <div class="product-price">£${p.price}</div>
        <div>Stock: ${p.packs_left}</div>
        <button ${p.packs_left<=0?'disabled':''}
          onclick="addToBasket(${p.id},'${p.name}',${p.price})">
          ${p.packs_left<=0?'Out of Stock':'Add Pack'}
        </button>
      </div>
    `;
  });
}

function addToBasket(id,name,price){
  const existing=basket.find(x=>x.id===id);
  if(existing){
    existing.qty++;
  }else{
    basket.push({id,name,price,qty:1});
  }
  updateBasket();
}

function updateBasket(){
  document.getElementById("basketCount").innerText=basket.reduce((a,b)=>a+b.qty,0);
  let total=0;
  let html="<table>";
  basket.forEach(item=>{
    total+=item.price*item.qty;
    html+=`<tr><td>${item.name} x${item.qty}</td><td>£${(item.price*item.qty).toFixed(2)}</td></tr>`;
  });
  html+="</table>";
  document.getElementById("basketItems").innerHTML=html;
  document.getElementById("basketTotal").innerText=total.toFixed(2);
}

async function checkout(){
  const name=document.getElementById("customerName").value.trim();
  const payment=document.getElementById("paymentMethod").value;

  if(!name||!payment) return alert("Enter details");
  if(basket.length===0) return alert("Basket empty");

 for(const item of basket){

  const {error:orderError}=await supa.from("shop_orders").insert([{
    product_id:item.id,
    product_name:item.name,
    price:item.price,
    quantity:item.qty,
    customer_name:name,
    payment_method:payment,
    delivered:false
  }]);

  if(orderError){
    alert(orderError.message);
    return;
  }

  const { error: stockError } = await supa.rpc("decrease_stock", {
    product_id_input: item.id,
    quantity_input: item.qty
  });

  if (stockError) {
    alert("Stock update failed: " + stockError.message);
    return;
  }
}

  alert("Reservation confirmed ✔️");
  basket=[];
  updateBasket();
  toggleBasket();
  loadProducts();
}

async function addProduct(){

  const nameInput = document.getElementById("name").value;
  const descInput = document.getElementById("description").value;
  const priceInput = parseFloat(document.getElementById("price").value);
  const stockInput = parseInt(document.getElementById("stock").value);
  const imageInput = document.getElementById("image").value;

  if(!nameInput || isNaN(priceInput) || isNaN(stockInput)){
    alert("Please complete all required fields");
    return;
  }

  const { error } = await supa.from("products").insert([{
    category:"balls",
    name:nameInput,
    description:descInput,
    price:priceInput,
    packs_left:stockInput,
    image:imageInput,
    active:true
  }]);

  if(error){
    alert(error.message);
    return;
  }

  loadProducts();
  loadAdminProducts();
}

async function loadAdminProducts(){
  const {data,error}=await supa.from("products")
    .select("*")
    .eq("active", true);

  if(error){
    alert(error.message);
    return;
  }

  let html="<table><tr><th>Name</th><th>Price</th><th>Stock</th><th>Actions</th></tr>";

  data.forEach(p=>{
    html+=`<tr>
      <td><input id="name_${p.id}" value="${p.name}"></td>
      <td><input type="number" id="price_${p.id}" value="${p.price}"></td>
      <td><input type="number" id="stock_${p.id}" value="${p.packs_left}"></td>
      <td>
        <button onclick="saveProduct(${p.id})">Save</button>
        <button onclick="deleteProduct(${p.id})" style="background:#c0392b;">Delete</button>
      </td>
    </tr>`;
  });

  html+="</table>";

  document.getElementById("adminProducts").innerHTML=html;
}
  async function saveProduct(id){

  const name=document.getElementById(`name_${id}`).value;
  const price=document.getElementById(`price_${id}`).value;
  const stock=document.getElementById(`stock_${id}`).value;

  await supa.from("products")
    .update({
      name:name,
      price:price,
      packs_left:stock
    })
    .eq("id",id);

  loadProducts();
  loadAdminProducts();
}

async function deleteProduct(id){
  await supa.from("products")
    .update({active:false})
    .eq("id",id);

  loadProducts();
  loadAdminProducts();
}

/* ======================
   NEW: ORDER MANAGEMENT
====================== */

async function loadOrders(){
  const {data}=await supa.from("shop_orders")
    .select("*")
    .order("id",{ascending:false});

  let html="<h3>Orders</h3>";
  html+="<table><tr><th>Name</th><th>Product</th><th>Qty</th><th>Payment</th><th>Status</th><th>Actions</th></tr>";

  data.forEach(o=>{
    html+=`<tr>
      <td>${o.customer_name}</td>
      <td>${o.product_name}</td>
      <td>${o.quantity}</td>
      <td>${o.payment_method}</td>
      <td>${o.delivered ? "Delivered" : "Pending"}</td>
      <td>
        ${!o.delivered ? `<button onclick="markDelivered(${o.id})">Deliver</button>` : ""}
        <button onclick="cancelOrder(${o.id},${o.product_id},${o.quantity})" style="background:#c0392b;margin-left:5px;">Cancel</button>
      </td>
    </tr>`;
  });

  html+="</table>";

  document.getElementById("ordersContainer").innerHTML=html;
}

async function markDelivered(id){
  await supa.from("shop_orders")
    .update({delivered:true})
    .eq("id",id);

  loadOrders();
}
  async function cancelOrder(orderId, productId, quantity){

  if(!confirm("Cancel this order?")) return;

  // Get current stock
  const {data:product}=await supa
    .from("products")
    .select("packs_left")
    .eq("id",productId)
    .single();

  // Restore stock
  await supa.from("products")
    .update({packs_left: product.packs_left + quantity})
    .eq("id",productId);

  // Delete order
  await supa.from("shop_orders")
    .delete()
    .eq("id",orderId);

  loadProducts();
  loadOrders();
}
</script>

</body>
</html>
